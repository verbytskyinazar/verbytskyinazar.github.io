<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open in MeSize</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f2f7ff; color: #1a1a2e; padding: 24px;
      }
      @media (prefers-color-scheme: dark) { body { background: #0c1124; color: #eaf0ff; } }
      .card { max-width: 420px; text-align: center; }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #6b6b82; margin: 0 0 24px; }
      @media (prefers-color-scheme: dark) { p { color: #8a91ad; } }
      .btn {
        display: inline-block; padding: 14px 22px; border-radius: 999px; text-decoration: none;
        font-weight: 600; background: #2e7cf6; color: #fff; margin: 6px;
      }
      .btn.secondary { background: rgba(127,127,140,0.18); color: inherit; }
      .stores { margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Someone shared their sizes with you</h1>
      <p>Open this in the MeSize app to save the profile.</p>
      <a class="btn" id="open" href="#">Open in MeSize</a>
      <div class="stores">
        <a class="btn secondary" href="https://apps.apple.com/us/app/mesize/id6790968741">Get MeSize on the App Store</a>
      </div>
    </div>
    <script>
      // If the app is installed, the OS opens it via the Universal/App Link and this
      // page never shows. Shown only as a fallback → offer the app + a manual open.
      var d = new URLSearchParams(location.search).get('d');
      var scheme = 'mesize://import' + (d ? ('?d=' + encodeURIComponent(d)) : '');
      document.getElementById('open').setAttribute('href', scheme);
    </script>
  </body>
</html>
